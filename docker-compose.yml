version: "3.9"

services:
  ### --- Frontend (Nginx for production) ---
  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: vue_frontend
    ports:
      - "8080:80"
    restart: unless-stopped
    depends_on:
      - backend

  ### --- Frontend Dev (Vite hot reload) ---
  frontend-dev:
    build:
      context: .
      dockerfile: docker/frontend-dev/Dockerfile
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    depends_on:
      - backend

  ### --- Backend API ---
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: node_backend
    ports:
      - "3000:3000"
    environment:
      - MONGO_URL=mongodb://appuser:apppass@db:27017/?authSource=admin
    restart: unless-stopped
    depends_on:
      - db

  ### --- Database (MongoDB) ---
  db:
    build:
      context: .
      dockerfile: docker/database/Dockerfile
    container_name: mongo_db
    environment:
      MONGO_INITDB_ROOT_USERNAME: appuser
      MONGO_INITDB_ROOT_PASSWORD: apppass
      MONGO_INITDB_DATABASE: appdb
    ports:
      - "27017:27017"
    volumes:
      - db_data:/var/lib/mongodb/data

volumes:
  db_data: